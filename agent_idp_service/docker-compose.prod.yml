services:
  agent-idp:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    ports:
      - "7001:7001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agent_idp
      POSTGRES_USER: agent_idp
      POSTGRES_PASSWORD: change-me
    ports:
      - "5433:5432"
    volumes:
      - agent_idp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_idp -d agent_idp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  agent_idp_pgdata:
