<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hydra Admin Login</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem; max-width: 680px; }
      .card { border: 1px solid #d0d7de; border-radius: 8px; padding: 1rem; }
      .error { color: #b42318; margin-bottom: 1rem; }
      label { display: block; margin-top: 0.75rem; }
      input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
      button { margin-top: 1rem; padding: 0.6rem 1rem; }
      .hint { color: #57606a; font-size: 0.95rem; }
    </style>
  </head>
  <body>
    <h1>Hydra Admin</h1>
    <p class="hint">Local admin UI for OAuth client management.</p>
    <div class="card">
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="post" action="/admin/login">
        <label>Username</label>
        <input type="text" name="username" required />

        <label>Password</label>
        <input type="password" name="password" required />

        <button type="submit">Sign in</button>
      </form>
      <p class="hint">Default creds: admin / adminpass123 (override with env vars)</p>
    </div>
  </body>
</html>
